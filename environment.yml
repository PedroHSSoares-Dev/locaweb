name: predictfy-locaweb
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11

  # Dados
  - pandas>=2.2
  - numpy>=1.26,<2.0
  - openpyxl>=3.1
  - pyarrow>=17.0

  # ML base (via conda — resolução mais estável)
  - scikit-learn>=1.6
  - xgboost>=2.1
  - imbalanced-learn>=0.12

  # Visualização
  - matplotlib>=3.9
  - seaborn>=0.13

  # Notebooks
  - jupyterlab
  - ipykernel

  # Utilitários
  - python-dotenv>=1.0
  - requests>=2.32
  - pip

  - pip:
      # Prophet via pip — wheel nativa para 3.11, sem conflito com conda
      - prophet>=1.1.5
      # SHAP via pip — versão compatível com numpy<2
      - shap>=0.45,<0.50
      # Feriados brasileiros (regressor externo do Prophet)
      - holidays>=0.70
